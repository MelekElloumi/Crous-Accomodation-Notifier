name: Build Windows package

# Builds a standalone Windows .exe (Python + Selenium bundled in) and zips it
# together with the config templates and a user guide.
# - Runs on demand (Actions tab -> Run workflow) and on every "v*" tag.
# - Tag pushes also attach the zip to a GitHub Release.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name CrousNotifier --collect-all selenium gui.py

      - name: Assemble package
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/CrousNotifier.exe       package/
          Copy-Item crous_config.example.json    package/
          Copy-Item mailjet_config.example.json  package/
          Copy-Item packaging/README_USER.txt    package/README.txt
          Compress-Archive -Path package/* -DestinationPath CrousNotifier-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrousNotifier-windows
          path: CrousNotifier-windows.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CrousNotifier-windows.zip
